# ─────────────────────────────────────────────────────────────
#  CodeGuard – AI-Powered Code Review Assistant
#  Application Configuration
# ─────────────────────────────────────────────────────────────

spring.application.name=codeguard
server.port=8080

# ── OpenAI / Spring AI ───────────────────────────────────────
# Replace with your actual OpenAI API key (never commit real keys!)
openai.api.key=${OPENAI_API_KEY:your-openai-api-key-here}
openai.model=gpt-4-turbo
openai.max-tokens=2048
openai.temperature=0.2

spring.ai.openai.api-key=${OPENAI_API_KEY:your-openai-api-key-here}
spring.ai.openai.chat.options.model=gpt-4-turbo
spring.ai.openai.chat.options.temperature=0.2
spring.ai.openai.chat.options.max-tokens=2048

# ── GitHub Webhook ───────────────────────────────────────────
github.webhook.secret=${GITHUB_WEBHOOK_SECRET:your-webhook-secret-here}

# ── CodeGuard Settings ───────────────────────────────────────
# Default review profile if no PR label is present (GENERAL | SECURITY | PERFORMANCE)
codeguard.default-review-profile=GENERAL

# Max diff size in characters before truncation (~3000 tokens)
codeguard.max-diff-chars=12000

# ── Async Thread Pool ────────────────────────────────────────
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=50
spring.task.execution.thread-name-prefix=codeguard-async-

# ── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=CodeGuard
info.app.version=1.0.0
info.app.description=AI-Powered Code Review Assistant

# ── Logging ──────────────────────────────────────────────────
logging.level.com.codeguard=DEBUG
logging.level.org.springframework.ai=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
